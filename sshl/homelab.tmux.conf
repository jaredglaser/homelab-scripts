# sshl session config.
#
# Loaded by the launcher on a dedicated socket (`tmux -L homelab`), so
# nothing here affects your default tmux sessions.
#
# User options populated by the launcher (accessible as #{@name}):
#   @subnet          CIDR being managed (e.g. 10.1.1.0/24)         [session]
#   @cache_file      absolute path to ips.cache                    [session]
#   @cache_mtime     epoch seconds when cache was last written     [session]
#   @picker_script   absolute path to host-picker.sh               [session]
#   @info_script     absolute path to host-info.sh                 [session]
#   @default_layout  tmux layout name applied to each host window  [session]
#   @host_ip         this window's remote IP                       [window]
#   @host_user       this window's SSH user                        [window]
#   @host_name       this window's resolved hostname               [window]

# ── Pane death ────────────────────────────────────────────────────────
# When a pane's command exits non-zero (ssh drop, htop crash, etc.),
# keep the pane visible so the error message stays readable. Press
# `<prefix> r` to respawn. Successful exits close normally.
set -g remain-on-exit failed
set-hook -g pane-died "display-message 'pane died in ##W. Press <prefix> r to respawn.'"

# Respawn the pane AND kick a fresh host-info check. When a host
# reboots, ssh drops → pane is dead → you press `<prefix> r`. That's
# the natural "host is back, refresh everything" signal, so we also
# force-refresh uptime/updates (same action as the ↻ button).
bind-key r {
    respawn-pane -k
    run-shell -b "'#{@info_script}' -f '#{@host_user}' '#{@host_ip}' >/dev/null 2>&1"
    display-message "respawned + refreshing #{@host_name}…"
}

# ── Pane titles & borders ─────────────────────────────────────────────
# Labels at the top of each pane. The launcher sets a title via
# `select-pane -T` ("ssh user@host" on the left, right-pane command on
# the right); pane_current_command is the fallback.
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour208,bold"
set -g pane-border-format "#[align=centre,fg=colour244] #{pane_index} │ #{?pane_title,#{pane_title},#{pane_current_command}} "

# ── Fuzzy host picker ─────────────────────────────────────────────────
# `<prefix> H` opens a centered popup that fuzzy-searches the IP
# cache and jumps to the matching window.
bind-key H display-popup -E -w 70% -h 60% \
    'TMUX_HOMELAB_CACHE="#{@cache_file}" "#{@picker_script}"'

# ── Status bar ────────────────────────────────────────────────────────
# Two-row bar. Row 0 is the default layout (status-left + window list +
# status-right). Row 1 is a secondary info strip defined via
# `status-format[1]`.
set -g status 2
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Palette: every color below references one of these codes. Swap
# them to re-theme the whole bar without touching layout.
# TODO(you): tune to your konsole theme. Preview any 256-color code
# with:  for i in {0..255}; do printf "\e[48;5;${i}m %3d " $i; done
#
# Current scheme (muted dark, orange accent):
#   bg=236   surface=238   fg=252   dim=244
#   accent=208   ok=114    warn=215   bad=203

# Overall bar + message style
set -g status-style          "bg=colour236,fg=colour252"
set -g message-style         "bg=colour208,fg=colour236,bold"
set -g message-command-style "bg=colour238,fg=colour252"

# Window tabs (the list of hosts in the middle)
set -g window-status-separator ""
set -g window-status-format          "#[bg=colour236,fg=colour244]  #I · #W  "
set -g window-status-current-format  "#[bg=colour208,fg=colour236,bold]  #I · #W  "
set -g window-status-activity-style  "bg=colour215,fg=colour236"
set -g window-status-bell-style      "bg=colour203,fg=colour236,bold"

# Row 0: session badge on the left, host info on the right
set -g status-left-length  40
set -g status-right-length 90
# Show the session *group* name rather than this konsole's grouped-
# session name. Base session is "homelab"; each attach gets a grouped
# session called "homelab-2", "-3", etc. #{session_group} collapses
# those back to the logical name we care about.
set -g status-left "#[bg=colour208,fg=colour236,bold]  #{?session_group,#{session_group},#S}  #[bg=colour236,fg=colour208]  "

# TODO(you): design your status-right. Building blocks:
#
#   #S                                session name
#   #{session_windows}                host count
#   #{session_attached}               attached clients (>1 = grouped)
#   #{@subnet}                        CIDR being managed
#   #{@default_layout}                layout name
#   #(date -d @#{@cache_mtime} +%H:%M)          cache write clock time
#   #(awk 'END{print NR}' '#{@cache_file}')     host count from cache
#
# Segment styling: "#[fg=colour208,bg=colour238,bold]" ... "#[default]"
# Trade-offs:
#   - Every #(…) is a shell fork per status-interval (5s). A couple is fine.
#   - Right side truncates on narrow terminals, so keep total under ~80ch.
#
set -g status-right "#[fg=colour244]#{@host_ip}#[default]   #[fg=colour114]●#[default] #{session_windows} hosts   %-l:%M %p  "

# Row 1: live info about the host the active window is sshed into.
# Left:  uptime + pending package updates (fetched by host-info.sh,
#        cached 60s per host so we don't SSH every 5s).
# Right: dead-pane count across the session + total clients on the
#        server (counts konsoles, not just this grouped view).
#
# Notes:
#   - `##{pane_dead}` is intentional: inside #(…) a literal `#` must be
#     doubled to survive tmux format expansion.
#   - `#{@host_ip}` is window-scoped, so it auto-updates when you switch
#     windows. If empty (e.g. manually-created window), host-info.sh
#     prints nothing rather than erroring.
set -g status-format[1] "#[bg=colour238,fg=colour252] #[fg=colour208]#{@host_name}#[fg=colour252] #(#{@info_script} #{@host_user} #{@host_ip}) #[range=user|refresh,fg=colour208,bold]↻#[norange,fg=colour252,nobold]#[align=right]dead #(tmux -L homelab list-panes -s -t '#S' -F '##{pane_dead}' 2>/dev/null | grep -c 1) #[fg=colour244]·#[fg=colour252] clients #(tmux -L homelab list-clients 2>/dev/null | wc -l) "

# Status-line click dispatch: clicking the ↻ range clears the host's
# info cache and primes it fresh. Any other status click falls through
# to the default (`select-window -t=`, which jumps to the clicked tab).
bind-key -T root MouseDown1Status {
    if -F '#{==:#{mouse_status_range},refresh}' {
        run-shell -b "'#{@info_script}' -f '#{@host_user}' '#{@host_ip}' >/dev/null 2>&1"
        display-message "refreshing #{@host_name}…"
    } {
        select-window -t=
    }
}

# ── Misc ──────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
setw -g aggressive-resize on
